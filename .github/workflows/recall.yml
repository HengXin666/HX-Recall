# HX-Recall: B站收藏夹吃灰清灰 - 定时推送
#
# 功能: 每天从你的B站收藏夹中挑选"最久未见的好内容"推送给你
# 默认: 每天 UTC 10:00 (北京时间 18:00)
#
# 凭证: 使用 HX-Workflows 的 bilibili-api (OAuth2 Token 持久化保活)
# Token 由 HX-Workflows 的 CI 每日自动刷新，存储于 __HX-Data__ 仓库的 bilibili-token 分支
#
# 首次使用:
#   1. Fork 本仓库 + HX-Workflows 仓库
#   2. 在 HX-Workflows 中运行 upload_token.py 完成首次扫码登录
#   3. 启用 HX-Workflows 的 CI (bilibili-token-refresh.yml)
#   4. Settings → Secrets → Actions 添加:
#      - DEDEUSERID: 你的B站UID
#      - GIT_DB_REPO_URL: Git DB 仓库地址 (如 https://github.com/user/repo.git)
#      - GIT_DB_BRANCH: Git DB 分支名 (如 HX-RECALL)
#      - GIT_DB_TOKEN: 有 __HX-Data__ 仓库读权限的 PAT (Personal Access Token)
#      邮件推送(可选):
#      - NOTIFY_EMAIL_SMTP: SMTP服务器 (如 smtp.qq.com)
#      - NOTIFY_EMAIL_SENDER: 发件邮箱
#      - NOTIFY_EMAIL_PASSWORD: 邮箱授权码
#      - NOTIFY_EMAIL_RECEIVERS: 收件邮箱(多个逗号分隔)
#      Variables (非机密, 可随时修改):
#      - FAVORITE_IDS: 收藏夹ID(多个逗号分隔, 留空则全部, 可从收藏夹URL获取)
#      - STRATEGY: 选取策略 (random/latest/oldest/dusty, 默认dusty)
#      - TOP_K: 每次推送数量 (默认5)
#      - DUST_COOLDOWN_DAYS: 吃灰冷却期天数 (默认30)
#      - DUST_ALLOW_REPUSH: 冷却期后是否允许重复推送 (true/false, 默认true)

name: Recall Dusty Favorites

on:
  schedule:
    - cron: "0 10 * * *"  # UTC 10:00 = 北京 18:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recall:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build config from secrets
        run: |
          uv run python3 -u -c "
          import yaml, os

          cfg = {
            'bilibili_uid': int(os.environ.get('DEDEUSERID', '0') or '0'),
            'bilibili_token': {
              'repo': 'https://github.com/HengXin666/__HX-Data__.git',
              'branch': 'bilibili-token',
            },
            'top_k': int(os.environ.get('TOP_K', '5') or '5'),
            'strategy': os.environ.get('STRATEGY', 'dusty') or 'dusty',
            'favorite_ids': [int(x) for x in os.environ.get('FAVORITE_IDS', '').split(',') if x.strip()],
            'dust': {
              'cooldown_days': int(os.environ.get('DUST_COOLDOWN_DAYS', '30') or '30'),
              'allow_repush': os.environ.get('DUST_ALLOW_REPUSH', 'true').lower() != 'false',
            },
            'git_db': {
              'enabled': True,
              'repo_url': os.environ.get('GIT_DB_REPO_URL', ''),
              'branch': os.environ.get('GIT_DB_BRANCH', ''),
              'token': os.environ.get('GIT_DB_TOKEN', ''),
            },
            'schedule': {'cron': '0 10 * * *', 'enabled': True},
            'notify': {
              'email': {
                'enabled': bool(os.environ.get('NOTIFY_EMAIL_SMTP', '')),
                'smtp_host': os.environ.get('NOTIFY_EMAIL_SMTP', ''),
                'smtp_port': 465,
                'use_ssl': True,
                'sender': os.environ.get('NOTIFY_EMAIL_SENDER', ''),
                'password': os.environ.get('NOTIFY_EMAIL_PASSWORD', ''),
                'receivers': [r for r in os.environ.get('NOTIFY_EMAIL_RECEIVERS', '').split(',') if r],
              },
              'server_chan': {'enabled': False, 'sendkey': ''},
              'telegram': {'enabled': False, 'bot_token': '', 'chat_id': ''},
              'webhook': {'enabled': False, 'url': '', 'headers': {}},
              'console': {'enabled': True},
            },
            'houtiku': {
              'enabled': False,
              'endpoint': '',
              'token': '',
            },
          }

          with open('config.yaml', 'w') as f:
              yaml.dump(cfg, f, allow_unicode=True, default_flow_style=False)
          print('config.yaml created from secrets')
          "
        env:
          DEDEUSERID: ${{ secrets.DEDEUSERID }}
          GIT_DB_REPO_URL: ${{ secrets.GIT_DB_REPO_URL }}
          GIT_DB_BRANCH: ${{ secrets.GIT_DB_BRANCH }}
          GIT_DB_TOKEN: ${{ secrets.GIT_DB_TOKEN }}
          NOTIFY_EMAIL_SMTP: ${{ secrets.NOTIFY_EMAIL_SMTP }}
          NOTIFY_EMAIL_SENDER: ${{ secrets.NOTIFY_EMAIL_SENDER }}
          NOTIFY_EMAIL_PASSWORD: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          NOTIFY_EMAIL_RECEIVERS: ${{ secrets.NOTIFY_EMAIL_RECEIVERS }}
          FAVORITE_IDS: ${{ vars.FAVORITE_IDS }}
          STRATEGY: ${{ vars.STRATEGY }}
          TOP_K: ${{ vars.TOP_K }}
          DUST_COOLDOWN_DAYS: ${{ vars.DUST_COOLDOWN_DAYS }}
          DUST_ALLOW_REPUSH: ${{ vars.DUST_ALLOW_REPUSH }}

      - name: Run HX-Recall
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_DB_TOKEN }}
          GITHUB_ACTIONS: "true"
        run: uv run python -u -m hx_recall --config config.yaml
